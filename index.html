<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo | Aluli Shop</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <div class="cuadrado-login">
            <div class="header-admin">
                <h2 class="admin-panel">Panel <span>Administrativo</span></h2>
            </div>
            <p class="admin-panel">Control de inventario</p>
            
            <form id="admin-form">
                <div class="input-group">
                    <input type="text" id="admin-user" placeholder="Usuario " required>
                </div>
                <div class="input-group">
                    <input type="password" id="admin-pass" placeholder="Contraseña " required>
                
                </div>
                <div id="mensaje-error" class="mensaje-alerta"></div>
                <button type="submit" class="btn-admin">Acceder al Sistema</button>
            </form>
            <a href="https://alulishop.github.io/principal/" class="link-regreso">← Volver al inicio</a>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
